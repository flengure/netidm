---
name: Main Branch Rolling Release

on:
  push:
    branches:
      - main

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config

      - name: Build release binaries
        env:
          NETIDM_BUILD_PROFILE: release_linux
        run: |
          cargo build --release --locked \
            --target ${{ matrix.target }} \
            --bin netidmd \
            --bin netidm \
            --bin netidm_ssh_authorizedkeys_direct

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/netidmd
          strip target/${{ matrix.target }}/release/netidm
          strip target/${{ matrix.target }}/release/netidm_ssh_authorizedkeys_direct

      - name: Package tarball
        run: |
          TARBALL="netidm-main-latest-${{ matrix.target }}.tar.gz"
          mkdir -p dist/static
          cp target/${{ matrix.target }}/release/netidmd dist/
          cp target/${{ matrix.target }}/release/netidm dist/
          cp target/${{ matrix.target }}/release/netidm_ssh_authorizedkeys_direct dist/
          cp server/daemon/debian/server.toml dist/server.toml.example
          cp server/daemon/debian/netidmd.service dist/netidmd.service
          cp -r server/core/static/. dist/static/
          tar -czf "$TARBALL" -C dist .
          sha256sum "$TARBALL" > "$TARBALL.sha256"
          echo "${{ github.sha }}" > COMMIT
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: netidm-${{ matrix.target }}
          path: |
            netidm-*.tar.gz
            netidm-*.tar.gz.sha256
            COMMIT

  release:
    name: Publish main-latest Rolling Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: "Netidm main-latest (rolling)"
          draft: false
          prerelease: true
          make_latest: false
          body: |
            Rolling pre-release built from the tip of `main`.
            Commit: ${{ github.sha }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/COMMIT
