---
name: "Linux Build and Test"
# Trigger the workflow on push to main or pull request
"on":
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rust_build:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Share cache across jobs within this workflow; bust when
          # toolchain or Cargo.lock changes.
          shared-key: "linux-build-and-test"
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config

      - name: "Build the workspace"
        run: cargo build --locked --workspace
      - name: "Run cargo test"
        run: cargo test
      - name: "Check disk space at the end"
        run: |
          df -h
          du -shc target/*
  rust_build_next:
    # build future versions to find possible next-version bugs
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    strategy:
      matrix:
        rust_version: ["beta", "nightly"]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_version }}
      - uses: Swatinem/rust-cache@v2
        with:
          # Cache is keyed on the installed toolchain, so each matrix
          # leg gets its own slot without colliding with `rust_build`.
          shared-key: "linux-build-next-${{ matrix.rust_version }}"
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config

      - name: "Build the workspace"
        run: cargo build --locked --workspace
      - name: "Run cargo test"
        run: cargo test
      - name: "Check disk space at the end"
        run: |
          df -h
          du -shc target/*

  run_release:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      MALLOC_CONF: "thp:always,metadata_thp:always"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Release profile has a different target dir; keep its cache
          # distinct from the debug builds above.
          shared-key: "linux-run-release"
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config \
            ripgrep
      - name: "Run the release build test script"
        env:
          BUILD_MODE: --release
        run: |
          python -m pip install uv
          ./scripts/test_run_release_server.sh
