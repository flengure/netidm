---
name: "Linux Build and Test"
# Trigger the workflow on push to main or pull request.
# The `schedule` + `workflow_dispatch` triggers are for the non-blocking
# beta / nightly-toolchain matrix in `rust_build_next`, which is gated
# below to only run on those events — see its `if:` guard.
"on":
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Daily at 06:00 UTC — catches Rust beta/nightly regressions with
    # ~24 h latency, which is plenty for non-blocking early-warning.
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rust_build:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: true
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config

      - name: "Build the workspace"
        run: cargo build --locked --workspace
      - name: "Run cargo test"
        run: cargo test
      - name: "Check disk space at the end"
        run: |
          df -h
          du -shc target/*
  rust_build_next:
    # Build against future Rust versions to catch toolchain regressions
    # before they reach stable. Non-blocking (`continue-on-error`) and
    # gated to run only on the daily `schedule` cron or a manual
    # `workflow_dispatch` — NOT on every PR or push-to-main, which
    # would pay 2 × ~17 min of CI wall-clock for a signal that isn't
    # gating any merge decision.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SCCACHE_GHA_ENABLED: true
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    strategy:
      matrix:
        rust_version: ["beta", "nightly"]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_version }}
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config

      - name: "Build the workspace"
        run: cargo build --locked --workspace
      - name: "Run cargo test"
        run: cargo test
      - name: "Check disk space at the end"
        run: |
          df -h
          du -shc target/*

  run_release:
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: true
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      MALLOC_CONF: "thp:always,metadata_thp:always"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config \
            ripgrep
      - name: "Run the release build test script"
        env:
          BUILD_MODE: --release
        run: |
          python -m pip install uv
          ./scripts/test_run_release_server.sh
