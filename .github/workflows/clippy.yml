---
name: Linting checks

# Trigger the workflow on push
"on":
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  clippy:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # Clippy inspects every crate in the workspace — its cache
          # shape is distinct from the build/test cache, so give it
          # its own slot.
          shared-key: "linting-clippy"
      - name: Install dependencies
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
            libpam0g-dev \
            libselinux1-dev \
            libssl-dev \
            libsystemd-dev \
            libtss2-dev \
            libudev-dev \
            libxmlsec1-dev \
            libxml2-dev \
            pkg-config \
            tpm-udev
      - name: "Run clippy"
        run: cargo clippy --lib --bins --examples --all-features
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # No rust-cache here — `cargo fmt --check` doesn't compile
      # anything, so there's nothing to cache.
      - name: "Run cargo fmt"
        run: cargo fmt --check
