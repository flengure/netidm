---
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.10.0)"
        required: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install native build dependencies
        if: matrix.cross == false
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libpam0g-dev \
            libudev-dev \
            libssl-dev \
            libsystemd-dev

      - name: Install cross-compilation dependencies (aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update && sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libssl-dev \
            pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"

      - name: Build release binaries
        run: |
          cargo build --release --locked \
            --target ${{ matrix.target }} \
            --bin netidmd \
            --bin netidm \
            --bin netidm_ssh_authorizedkeys_direct

      - name: Strip binaries
        if: matrix.cross == false
        run: |
          strip target/${{ matrix.target }}/release/netidmd
          strip target/${{ matrix.target }}/release/netidm
          strip target/${{ matrix.target }}/release/netidm_ssh_authorizedkeys_direct

      - name: Strip binaries (cross)
        if: matrix.cross == true
        run: |
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/netidmd
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/netidm
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/netidm_ssh_authorizedkeys_direct

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TARBALL="netidm-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/netidmd dist/
          cp target/${{ matrix.target }}/release/netidm dist/
          cp target/${{ matrix.target }}/release/netidm_ssh_authorizedkeys_direct dist/
          cp server/daemon/debian/server.toml dist/server.toml.example
          cp server/daemon/debian/netidmd.service dist/netidmd.service
          tar -czf "$TARBALL" -C dist .
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          sha256sum "$TARBALL" > "$TARBALL.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: netidm-${{ matrix.target }}
          path: |
            netidm-*.tar.gz
            netidm-*.tar.gz.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Netidm ${{ steps.version.outputs.version }}"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
