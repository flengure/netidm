---
# mkdocs.yml
site_name: Netidm Python library
use_directory_urls: false
theme:
  name: material
  color_mode: auto
  user_color_mode_toggle: true
  hljs_languages:
    - rust
    - json
    - yaml

repo_name: "netidm/netidm"
repo_url: "https://github.com/netidm/netidm"

plugins:
  - search:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          rendering:
            show_source: true
  - gen-files:
      scripts:
        - docs/hooks/gen_files.py
watch:
  - "netidm/"

nav:
  - "Home": index.md
  - "Client": netidmclient.md
  - "Client Configuration": netidmclientconfig.md
  - "RADIUS Client": radiusclient.md
  - "Token Storage": tokenstore.md
