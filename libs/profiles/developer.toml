# Set to native for developer machines.
cpu_flags = "native"
server_admin_bind_path = "/tmp/netidmd.sock"
server_ui_pkg_path = "../core/static"
server_config_path = "../../examples/insecure_server.toml"
server_migration_path = "/tmp/netidm/migrations.d"
client_config_path = "/etc/netidm/config"
resolver_config_path = "/tmp/unixd"
resolver_service_account_token_path = "/tmp/netidm-token"
resolver_unix_shell_path = "/bin/bash"
